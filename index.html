<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monadfolio - Your Monad Portfolio & Identity</title>
    <meta name="description" content="Transform your Monad wallet into a social, shareable on-chain identity. Visualize your portfolio, earn badges, and stay updated with Monad news.">
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://farcaster.xyz https://client.farcaster.xyz https://warpcast.com https://client.warpcast.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https: blob:;
      font-src 'self' data: https:;
      connect-src 'self' 
        https://farcaster.xyz 
        https://client.farcaster.xyz 
        https://warpcast.com 
        https://client.warpcast.com 
        https://wrpcd.net 
        https://*.wrpcd.net 
        https://privy.farcaster.xyz 
        https://privy.warpcast.com 
        https://auth.privy.io 
        https://*.rpc.privy.systems 
        https://*.supabase.co
        https://*.supabase.com;
      frame-src 'self' https://farcaster.xyz https://warpcast.com;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'self' https://farcaster.xyz https://warpcast.com;
    ">
    
    <!-- Farcaster configuration will be injected by Vite -->
    <meta name="fc:miniapp" content="__FARCASTER_MINIAPP_CONFIG__" />
    <meta name="fc:frame" content="__FARCASTER_FRAME_CONFIG__" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="__OG_TITLE__" />
    <meta property="og:description" content="__OG_DESCRIPTION__" />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:type" content="__OG_TYPE__" />
    <meta property="og:url" content="__OG_URL__" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="__TWITTER_CARD__" />
    <meta name="twitter:title" content="__TWITTER_TITLE__" />
    <meta name="twitter:description" content="__TWITTER_DESCRIPTION__" />
    <meta name="twitter:image" content="__TWITTER_IMAGE__" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
